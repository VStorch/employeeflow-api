version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: employeeflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: employeeflow
      POSTGRES_USER: employeeflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employeeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: employeeflow-api
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=employeeflow;Username=employeeflow;Password=${DB_PASSWORD}

      JwtSettings__Secret: ${JWT_SECRET}

      ENABLE_DOCS: "false"

volumes:
  postgres_data:
